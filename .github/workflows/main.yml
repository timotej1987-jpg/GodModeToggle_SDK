name: Build GodModeToggle SDK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create ScriptHookV import library
        shell: cmd
        run: lib /def:ScriptHookV.def /machine:x64 /out:ScriptHookV.lib

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GodModeToggle
          path: build/Release/GodModeToggle.asi
